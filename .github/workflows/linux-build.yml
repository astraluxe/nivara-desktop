name: Linux Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.56)'
        required: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            libasound2-dev \
            patchelf \
            libssl-dev \
            curl \
            wget \
            file

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (Linux)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Get version
        id: version
        run: |
          VERSION=$(cat src-tauri/tauri.conf.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename artifacts with consistent names
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "adris-setup-linux-$VERSION.deb"
          fi
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "adris-setup-linux-$VERSION.AppImage"
          fi

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: adris-setup-linux-*.deb

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: adris-setup-linux-*.AppImage

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            adris-setup-linux-*.deb
            adris-setup-linux-*.AppImage
          fail_on_unmatched_files: false
          # NEVER take the "latest release" slot — the Windows auto-updater and the
          # website download button resolve releases/latest/download/latest.json and
          # adris-setup.exe, which only Windows releases carry. A -linux release
          # marked latest 404s the updater ("could not check for updates").
          make_latest: false
